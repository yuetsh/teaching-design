services:
  teaching-design:
    build: .
    expose:
      - 3001
    env_file:
      - .env
    environment:
      - TEACHING_BOOKS_DB=/app/data/teaching-books.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - npm_proxy

networks:
  npm_proxy:
    external: true
